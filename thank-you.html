<!DOCTYPE html>
<!-- ════════════════════════════════════════════════════════════════
     BATLIVE — THANK-YOU.HTML
     Página de gracias tras compra en Stripe.
     Redirect configurado en Stripe Payment Link.

     ÍNDICE
     ────────────────────────────────────────────────────────────────
     1.  NAVBAR
     2.  THANK-YOU (mensaje + botón volver)
     3.  FOOTER
     ════════════════════════════════════════════════════════════════ -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    (function() {
      var t = localStorage.getItem('batlive-theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BatLive — Thank you</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="img/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
  <link rel="icon" type="image/png" sizes="96x96" href="img/favicon-96x96.png">
  <link rel="apple-touch-icon" href="img/apple-touch-icon.png">
  <link rel="manifest" href="img/site.webmanifest">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── 2. THANK-YOU ───────────────────────────────────────── -->
<section class="thankyou">
  <div class="container">
    <div class="thankyou-card">

      <div class="thankyou-check">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="42" height="42">
          <polyline points="4 12 10 18 20 6"/>
        </svg>
      </div>

      <h1 id="ty-h1">Thank you for your purchase!</h1>
      <p class="ty-sub" id="ty-sub">Your license will be sent automatically to the email address used during payment.</p>

      <ul class="ty-list">
        <li id="ty-l1">You'll receive the email in a few minutes</li>
        <li id="ty-l2">Check your SPAM folder if you don't see it</li>
      </ul>
    </div>
  </div>
</section>

<!-- ── 3. FOOTER ──────────────────────────────────────────── -->
<footer>
  <div class="container footer-inner">
    <div class="logo">BAT <span class="accent">LIVE</span></div>
    <p class="footer-copy" id="footer-copy">© 2026 Fornewday</p>
    <div class="footer-links">
      <a href="privacy.html" id="footer-privacy">Privacy Policy</a>
      <span class="footer-sep">·</span>
      <a href="terms.html" id="footer-terms">Terms of Use</a>
    </div>
    <p class="footer-right" id="footer-right">Windows 10 / 11</p>
  </div>
</footer>

<script src="script.js"></script>
<script src="thankyou.js"></script>
</body>
</html>
